<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flashcard — Fogli di Calcolo</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f4f3ee;
    --surface: #ffffff;
    --card-front: #ffffff;
    --card-back: #f9f8f4;
    --accent: #2a6b2a;
    --accent2: #1a7a5e;
    --text: #1a1a18;
    --muted: #8a8a82;
    --border: #ddddd6;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 20% 20%, rgba(42,107,42,0.05) 0%, transparent 60%),
      radial-gradient(ellipse 50% 60% at 80% 80%, rgba(26,122,94,0.04) 0%, transparent 60%);
    pointer-events: none;
  }

  header {
    text-align: center;
    margin-bottom: 2.5rem;
  }

  header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(1.6rem, 4vw, 2.4rem);
    letter-spacing: -0.02em;
    color: var(--text);
  }

  header h1 span {
    color: var(--accent);
  }

  header p {
    font-size: 0.72rem;
    color: var(--muted);
    margin-top: 0.4rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .counter {
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    color: var(--muted);
    margin-bottom: 1.2rem;
    text-align: center;
  }

  .counter span {
    color: var(--accent);
    font-weight: 700;
  }

  /* PROGRESS BAR */
  .progress-bar {
    width: min(480px, 90vw);
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    margin-bottom: 2rem;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.4s cubic-bezier(0.4,0,0.2,1);
  }

  /* CARD */
  .card-wrapper {
    perspective: 1200px;
    width: min(480px, 90vw);
    height: 280px;
    cursor: pointer;
    margin-bottom: 2rem;
  }

  .card {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.55s cubic-bezier(0.4, 0, 0.2, 1);
    border-radius: 16px;
  }

  .card.flipped {
    transform: rotateY(180deg);
  }

  .card-face {
    position: absolute;
    inset: 0;
    border-radius: 16px;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    border: 1px solid var(--border);
  }

  .card-front {
    background: var(--card-front);
  }

  .card-back {
    background: var(--card-back);
    transform: rotateY(180deg);
    border-color: rgba(42,107,42,0.2);
  }

  .card-label {
    font-size: 0.62rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 1rem;
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }

  .card-face {
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
  }

  .card-front .card-label::before {
    content: '';
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    display: inline-block;
  }

  .card-back .card-label::before {
    content: '';
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent2);
    display: inline-block;
  }

  .card-text {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(1rem, 3vw, 1.35rem);
    text-align: center;
    line-height: 1.45;
    color: var(--text);
  }

  .card-back .card-text {
    font-family: 'Space Mono', monospace;
    font-size: clamp(0.78rem, 2vw, 0.92rem);
    line-height: 1.65;
    font-weight: 400;
    color: #3a3a36;
  }

  /* hint */
  .hint {
    font-size: 0.62rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-top: 0.8rem;
    opacity: 0.6;
    text-align: center;
  }

  /* CONTROLS */
  .controls {
    display: flex;
    align-items: center;
    gap: 1rem;
  }

  .btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.08em;
    padding: 0.65rem 1.2rem;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s, color 0.2s, transform 0.1s;
    display: flex;
    align-items: center;
    gap: 0.4rem;
    user-select: none;
  }

  .btn:hover {
    background: #222228;
    border-color: var(--accent);
    color: var(--accent);
  }

  .btn:active {
    transform: scale(0.96);
  }

  .btn-nav {
    font-size: 1.1rem;
    padding: 0.65rem 1rem;
  }

  .btn-shuffle {
    background: rgba(42,107,42,0.07);
    border-color: rgba(42,107,42,0.3);
    color: var(--accent);
  }

  .btn-shuffle:hover {
    background: rgba(42,107,42,0.13);
    border-color: var(--accent);
    color: var(--accent);
  }

  /* SHAKE on wrong nav */
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }
  .shake { animation: shake 0.25s ease; }

  /* SHUFFLE ANIMATION */
  @keyframes shuffleOut {
    0% { opacity: 1; transform: rotateY(0) scale(1); }
    50% { opacity: 0; transform: rotateY(90deg) scale(0.9); }
    100% { opacity: 1; transform: rotateY(0) scale(1); }
  }
  .shuffling .card { animation: shuffleOut 0.4s ease; }
</style>
</head>
<body>

<header>
  <h1>Fogli di <span>Calcolo</span></h1>
  <p>Flashcard — Prof. Patanè Roberto</p>
</header>

<div class="counter">Carta <span id="currentNum">1</span> di <span id="totalNum">0</span></div>
<div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>

<div class="card-wrapper" id="cardWrapper" onclick="flipCard()">
  <div class="card" id="card">
    <div class="card-face card-front">
      <div class="card-label">termine</div>
      <div class="card-text" id="termText"></div>
    </div>
    <div class="card-face card-back">
      <div class="card-label">definizione</div>
      <div class="card-text" id="defText"></div>
    </div>
  </div>
</div>

<p class="hint">clicca per girare la carta</p>

<div class="controls" style="margin-top: 1.4rem;">
  <button class="btn btn-nav" id="btnPrev" onclick="navigate(-1)" title="Precedente">&#8592;</button>
  <button class="btn btn-shuffle" onclick="shuffle()">⇄ mescola</button>
  <button class="btn btn-nav" id="btnNext" onclick="navigate(1)" title="Successiva">&#8594;</button>
</div>

<script>
const raw = `MS Excel, Standard di settore per fogli di calcolo, potente per calcoli complessi, analisi dati e creazione di grafici;LO Calc, Alternativa gratuita e open-source di LibreOffice, compatibile con Excel;Google Fogli, Soluzione cloud di Google per la collaborazione in tempo reale e l'accesso da qualsiasi dispositivo;Foglio di lavoro, Area principale di un file di calcolo in cui vengono inseriti i dati;Righe, Elementi orizzontali del foglio identificati da numeri (1, 2, 3...);Colonne, Elementi verticali del foglio identificati da lettere (A, B, C...);Cella, Intersezione tra una riga e una colonna con indirizzo univoco (es. A1, B5);Intervallo, Gruppo di celle adiacenti indicato con prima e ultima cella separate da due punti (es. A1:C5);Celle non consecutive, Selezione di più celle o intervalli separati indicati con il punto e virgola (es. A1;C3 oppure A1:A3;C1:C3);Dati numerici, Numeri interi, decimali, percentuali e valute;Dati testuali, Nomi, descrizioni e codici;Dati data/ora, Valori in formati specifici per date e orari;Formule, Espressioni matematiche o logiche che iniziano con = ed eseguono calcoli;Formato cella, Definisce come vengono visualizzati i dati senza modificarne il valore sottostante;Riferimento relativo (A1), Riferimento che si adatta automaticamente alla nuova posizione quando la formula viene copiata o trascinata;Riferimento assoluto ($A$1), Riferimento bloccato con $ su riga e colonna che rimane invariato quando la formula viene copiata;Riferimento misto (A$1 o $A1), Blocca solo la riga o solo la colonna, utile in scenari di calcolo complessi;SOMMA(intervallo), Calcola la somma di tutti i numeri in un intervallo;PRODOTTO(intervallo), Moltiplica tutti i numeri in un intervallo;ARROTONDA(numero; cifre_decimali), Arrotonda un numero al numero di cifre decimali specificato;CONTA.NUMERI(intervallo), Conta le celle che contengono numeri;CONTA.VALORI(intervallo), Conta le celle che contengono valori di qualsiasi tipo;CONTA.VUOTE(intervallo), Conta le celle vuote in un intervallo;CASUALE(), Genera un numero casuale compreso tra 0 incluso e 1 escluso;CASUALE.TRA(n1;n2), Genera un numero intero casuale compreso tra n1 e n2 inclusi;MEDIA(intervallo), Calcola la media aritmetica di un intervallo;MEDIANA(intervallo), Calcola il valore mediano di un intervallo;MODA(intervallo), Restituisce il valore più ricorrente in un intervallo;MAX(intervallo), Trova il valore massimo in un intervallo;MIN(intervallo), Trova il valore minimo in un intervallo;E(condizione1; condizione2; ...), Restituisce VERO solo se tutte le condizioni sono vere;O(condizione1; condizione2; ...), Restituisce VERO se almeno una condizione è vera;NON(condizione), Inverte il valore logico della condizione;SE(condizione; valore_se_vero; valore_se_falso), Restituisce il primo valore se la condizione è vera, altrimenti il secondo;CONTA.SE(intervallo; condizione), Conta le celle in cui il valore soddisfa la condizione specificata;#DIV/0!, Errore di divisione per zero (es. =10/0);#RIF!, Riferimento a una cella non valida o eliminata;#VALORE!, Tipo di dato o argomento non valido nella formula (es. sommare un numero a una lettera);#NOME?, Nome di funzione o riferimento non riconosciuto (es. errore di digitazione nella funzione);#NUM!, Errore numerico non ammesso (es. radice quadrata di un numero negativo);#######, La cella è troppo stretta per visualizzare il valore (solo Excel e Calc);#ERROR!, Errore di sintassi nella formula (solo Google Sheets);Formattazione condizionale, Strumento che applica automaticamente un formato alle celle (colore testo, sfondo, bordi) in base a una condizione o al loro contenuto;Grafico a colonne/istogramma, Tipo di grafico usato per confrontare valori tra categorie diverse;Grafico a torta, Tipo di grafico usato per mostrare le proporzioni rispetto a un totale;Grafico a linee, Tipo di grafico usato per mostrare tendenze e andamenti nel tempo;Grafico a dispersione, Tipo di grafico usato per visualizzare la relazione tra due set di dati numerici`;

const cards = raw.split(';').map(s => {
  const idx = s.indexOf(',');
  return { term: s.slice(0, idx).trim(), def: s.slice(idx + 1).trim() };
});

let index = 0;
let flipped = false;
let deck = [...cards];

const card = document.getElementById('card');
const termText = document.getElementById('termText');
const defText = document.getElementById('defText');
const currentNum = document.getElementById('currentNum');
const totalNum = document.getElementById('totalNum');
const progressFill = document.getElementById('progressFill');
const wrapper = document.getElementById('cardWrapper');

totalNum.textContent = deck.length;

function render() {
  const c = deck[index];
  termText.textContent = c.term;
  defText.textContent = c.def;
  currentNum.textContent = index + 1;
  progressFill.style.width = ((index + 1) / deck.length * 100) + '%';
  if (flipped) {
    card.classList.remove('flipped');
    flipped = false;
  }
}

function flipCard() {
  flipped = !flipped;
  card.classList.toggle('flipped', flipped);
}

function navigate(dir) {
  const next = index + dir;
  if (next < 0 || next >= deck.length) {
    wrapper.classList.add('shake');
    wrapper.addEventListener('animationend', () => wrapper.classList.remove('shake'), { once: true });
    return;
  }
  index = next;
  render();
}

function shuffle() {
  wrapper.classList.add('shuffling');
  wrapper.addEventListener('animationend', () => {
    wrapper.classList.remove('shuffling');
    for (let i = deck.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [deck[i], deck[j]] = [deck[j], deck[i]];
    }
    index = 0;
    render();
  }, { once: true });
}

// keyboard navigation
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') navigate(1);
  if (e.key === 'ArrowLeft') navigate(-1);
  if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); flipCard(); }
});

render();
</script>
</body>
</html>
